name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_FILE: E_POS.sln
  BUILD_CONFIGURATION: Release

jobs:
  build-test:
    name: Build and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Check vulnerable packages
        run: dotnet list src/E_POS.Infrastructure/E_POS.Infrastructure.csproj package --vulnerable --include-transitive

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -m:1

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --no-restore --logger "trx;LogFilePrefix=e-pos-tests" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore